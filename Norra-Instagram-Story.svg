<svg width="1080" height="1920" viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1a14"/>
      <stop offset="1" stop-color="#06100c"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="34%" r="52%">
      <stop offset="0" stop-color="#1d6e54" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#06100c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34D399"/>
      <stop offset="1" stop-color="#7DEBC3"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>
  <rect width="1080" height="1920" fill="url(#glow)"/>

  <!-- brand row -->
  <g transform="translate(0,230)">
    <rect x="398" y="0" width="84" height="84" rx="22" fill="url(#mint)"/>
    <text x="440" y="60" text-anchor="middle" font-size="50" font-weight="800" fill="#04140e">N</text>
    <text x="502" y="60" font-size="50" font-weight="800" fill="#eaf3ee">Norra</text>
  </g>

  <!-- avatar -->
  <g transform="translate(540,700)">
    <circle r="225" fill="#34D399" fill-opacity="0.08"/>
    <circle r="195" fill="#0e2a20" stroke="#1f6e54" stroke-width="2"/>
    <circle r="210" fill="none" stroke="#34D399" stroke-opacity="0.35" stroke-width="3"/>
    <text x="0" y="58" text-anchor="middle" font-size="180" font-weight="850" fill="url(#mint)">N</text>
    <g transform="translate(-52,140)">
      <rect x="0" y="2" width="11" height="18" rx="5" fill="#7DEBC3"/>
      <rect x="26" y="-10" width="11" height="42" rx="5" fill="#7DEBC3"/>
      <rect x="52" y="-20" width="11" height="62" rx="5" fill="#7DEBC3"/>
      <rect x="78" y="-10" width="11" height="42" rx="5" fill="#7DEBC3"/>
      <rect x="104" y="2" width="11" height="18" rx="5" fill="#7DEBC3"/>
    </g>
  </g>

  <!-- headline -->
  <text x="540" y="1170" text-anchor="middle" font-size="120" font-weight="850" fill="#ffffff">Meet Norra</text>
  <text x="540" y="1258" text-anchor="middle" font-size="48" font-weight="700" fill="url(#mint)">Your AI receptionist.</text>

  <!-- short description -->
  <text x="540" y="1408" text-anchor="middle" font-size="46" font-weight="600" fill="#d6e6de">A receptionist with a human touch —</text>
  <text x="540" y="1470" text-anchor="middle" font-size="46" font-weight="600" fill="#d6e6de">answers your calls and books visits.</text>

  <!-- CTA -->
  <g transform="translate(540,1580)">
    <rect x="-270" y="0" width="540" height="104" rx="52" fill="url(#mint)"/>
    <text x="0" y="68" text-anchor="middle" font-size="44" font-weight="800" fill="#04140e">norrahq.com</text>
  </g>
  <text x="540" y="1770" text-anchor="middle" font-size="36" fill="#9ab0a6">DM me for a free demo</text>
</svg>
