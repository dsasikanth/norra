<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Norra — Knowledge Editor</title>
<style>
  :root{--cream:#FBF7F0;--ink:#23221F;--muted:#6F685D;--line:#E7DECF;--green:#15564A;--green2:#1E7A66;--amber:#E2873C;--card:#fff;--radius:14px}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--cream);color:var(--ink);line-height:1.5}
  .wrap{max-width:820px;margin:0 auto;padding:24px 20px 80px}
  header{display:flex;align-items:center;gap:12px;margin-bottom:8px}
  .mark{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--green),var(--green2));color:#fff;display:grid;place-items:center;font-weight:800;font-size:18px}
  header b{font-size:20px}
  .sub{color:var(--muted);font-size:13px;margin:0 0 22px 50px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:18px}
  .card h3{margin:0 0 14px;font-size:15px;color:var(--green)}
  label{display:block;font-size:12px;color:var(--muted);margin:0 0 4px}
  input,textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-size:14px;font-family:inherit;background:#fff;color:var(--ink)}
  input:focus,textarea:focus{outline:none;border-color:var(--green2)}
  .row{display:grid;gap:12px;margin-bottom:12px}
  .row.two{grid-template-columns:1fr 1fr}
  @media(max-width:560px){.row.two{grid-template-columns:1fr}}
  .svc,.faq{display:grid;gap:8px;align-items:end;border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:10px;background:#fdfbf7}
  .svc{grid-template-columns:2fr 1fr 1fr 1.4fr auto}
  .faq{grid-template-columns:1fr 1.4fr auto}
  @media(max-width:600px){.svc,.faq{grid-template-columns:1fr}}
  .del{background:#fbeaea;border:1px solid #f0d0d0;color:#b23b3b;border-radius:8px;padding:9px 11px;cursor:pointer;font-size:13px}
  .add{background:transparent;border:1px dashed var(--line);color:var(--green);border-radius:9px;padding:9px 14px;cursor:pointer;font-size:13px;font-weight:600}
  .actions{display:flex;gap:10px;flex-wrap:wrap;position:sticky;bottom:0;background:var(--cream);padding:14px 0;border-top:1px solid var(--line)}
  .btn{border:none;border-radius:999px;padding:12px 22px;font-size:14px;font-weight:700;cursor:pointer}
  .btn-primary{background:var(--green);color:#fff}
  .btn-ghost{background:#fff;border:1px solid var(--line);color:var(--ink)}
  #status{font-size:13px;margin-left:6px;align-self:center}
  pre{background:#0f1a16;color:#dbeee6;border-radius:10px;padding:16px;font-size:12px;white-space:pre-wrap;overflow:auto;max-height:340px;display:none}
</style>
</head>
<body>
<div class="wrap">
  <header><div class="mark">N</div><b>Norra — Knowledge Editor</b></header>
  <p class="sub">Edit your business info. Hit <b>Save &amp; update agent</b> and your AI receptionist uses it on the very next call.</p>

  <div class="card" style="border-color:#cfe0d6;background:#f4faf6">
    <h3>⚡ Import from website</h3>
    <div class="row two">
      <div><label>Website URL</label><input id="ingest_url" placeholder="brontecreekphysio.com"></div>
      <div style="display:flex;align-items:flex-end"><button class="btn btn-primary" style="width:100%" onclick="importSite()">Import &amp; pre-fill</button></div>
    </div>
    <div id="ingest_status" style="font-size:13px;color:var(--muted)"></div>
  </div>

  <div class="card">
    <h3>Business</h3>
    <div class="row two">
      <div><label>Business name</label><input id="business_name" placeholder="Bronte Creek Physiotherapy"></div>
      <div><label>Type</label><input id="business_type" placeholder="physiotherapy, massage & chiropractic clinic"></div>
    </div>
    <div class="row"><div><label>Address</label><input id="address" placeholder="360 Main St E, Milton, ON"></div></div>
    <div class="row two">
      <div><label>Hours</label><input id="hours" placeholder="Mon-Thu 8am-7pm; Fri 8am-5pm; Sat 9am-1pm"></div>
      <div><label>Service area</label><input id="service_area" placeholder="Milton and surrounding"></div>
    </div>
    <div class="row two">
      <div><label>Languages</label><input id="languages" placeholder="English, Hindi, Punjabi, Mandarin"></div>
      <div><label>Transfer number (for a human)</label><input id="transfer_number" placeholder="+1 905-555-0142"></div>
    </div>
  </div>

  <div class="card">
    <h3>Services &amp; prices</h3>
    <div id="services"></div>
    <button class="add" onclick="addService()">+ Add service</button>
  </div>

  <div class="card">
    <h3>FAQs</h3>
    <div id="faqs"></div>
    <button class="add" onclick="addFaq()">+ Add FAQ</button>
  </div>

  <div class="card">
    <h3>Policies / notes</h3>
    <textarea id="policies" rows="3" placeholder="Cancellation: 24-hour notice. Direct billing to major insurers. New patients arrive 10 min early."></textarea>
  </div>

  <pre id="preview"></pre>

  <div class="actions">
    <button class="btn btn-ghost" onclick="preview()">Preview agent prompt</button>
    <button class="btn btn-primary" onclick="save()">Save &amp; update agent</button>
    <span id="status"></span>
  </div>
</div>

<script>
// ===== config =====
// Point this at your deployed save endpoint (the Lambda/serverless function that
// writes to the DB and calls syncClient). Leave blank to just preview locally.
const NORRA_SAVE_API = "";   // e.g. "https://api.norrahq.com/save-knowledge"
const CLIENT_ID = "";        // the client's id (so the backend knows whose agent to update)
const NORRA_INGEST_API = ""; // e.g. "https://api.norrahq.com/ingest-website" — the website crawler endpoint
const NL = String.fromCharCode(10);

function esc(s){ return String(s||"").replace(/"/g, "&quot;"); }

function svcRow(s){ s=s||{}; return '<div class="svc">'+
  '<div><label>Service</label><input class="s-name" value="'+esc(s.name)+'" placeholder="Initial assessment"></div>'+
  '<div><label>Duration</label><input class="s-dur" value="'+esc(s.duration)+'" placeholder="45 min"></div>'+
  '<div><label>Price</label><input class="s-price" value="'+esc(s.price)+'" placeholder="$110"></div>'+
  '<div><label>Provider</label><input class="s-prov" value="'+esc(s.provider)+'" placeholder="Physiotherapist"></div>'+
  '<button class="del" onclick="this.parentElement.remove()">x</button></div>'; }

function faqRow(f){ f=f||{}; return '<div class="faq">'+
  '<div><label>Question</label><input class="f-q" value="'+esc(f.q)+'" placeholder="Do I need a referral?"></div>'+
  '<div><label>Answer</label><input class="f-a" value="'+esc(f.a)+'" placeholder="No referral needed for physio in Ontario."></div>'+
  '<button class="del" onclick="this.parentElement.remove()">x</button></div>'; }

function addService(s){ document.getElementById("services").insertAdjacentHTML("beforeend", svcRow(s)); }
function addFaq(f){ document.getElementById("faqs").insertAdjacentHTML("beforeend", faqRow(f)); }

function collect(){
  var v=function(id){ return document.getElementById(id).value.trim(); };
  var services=[].slice.call(document.querySelectorAll(".svc")).map(function(r){ return {
    name:r.querySelector(".s-name").value.trim(), duration:r.querySelector(".s-dur").value.trim(),
    price:r.querySelector(".s-price").value.trim(), provider:r.querySelector(".s-prov").value.trim() };
  }).filter(function(s){ return s.name; });
  var faqs=[].slice.call(document.querySelectorAll(".faq")).map(function(r){ return {
    q:r.querySelector(".f-q").value.trim(), a:r.querySelector(".f-a").value.trim() };
  }).filter(function(f){ return f.q; });
  return { business_name:v("business_name"), business_type:v("business_type"), address:v("address"),
    hours:v("hours"), service_area:v("service_area"), languages:v("languages"),
    transfer_number:v("transfer_number"), policies:v("policies"), services:services, faqs:faqs };
}

// mirrors norra-sync.js buildPrompt() so you can preview what the agent will receive
function buildPrompt(k){
  var L=[];
  L.push("You are Ava, the friendly virtual assistant for "+(k.business_name||"this business")+(k.business_type?", a "+k.business_type:"")+".");
  L.push("");
  L.push("MANNER: Warm, natural, unhurried — like a great front-desk person. Short sentences. Use their first name once you know it. Never sound scripted.");
  L.push("");
  L.push("IDENTITY & HONESTY: Greet and identify yourself as a virtual assistant; if asked whether you are human, say so honestly and offer to connect a person.");
  if(k.languages){ L.push(""); L.push("LANGUAGES: If the caller speaks "+k.languages+", continue in that language."); }
  L.push("");
  L.push("BOOKING: Check REAL availability with the booking tool; never invent a time. Collect name + mobile; confirm; send SMS.");
  L.push("");
  L.push("GUARDRAILS: Only use facts below. No professional/medical advice. Emergencies → tell them to call their local emergency number.");
  if(k.transfer_number){ L.push(""); L.push("TRANSFER: To reach a person, transfer to "+k.transfer_number+"."); }
  L.push("");
  L.push("--- BUSINESS KNOWLEDGE BASE ---");
  if(k.business_name) L.push("Business: "+k.business_name+(k.address?", "+k.address:"")+".");
  if(k.hours) L.push("Hours: "+k.hours+".");
  if(k.service_area) L.push("Service area: "+k.service_area+".");
  if(k.services && k.services.length){ L.push("Services:"); k.services.forEach(function(s){
    L.push("- "+s.name+(s.duration?" — "+s.duration:"")+(s.price?" — "+s.price:"")+(s.provider?" — "+s.provider:"")); }); }
  if(k.faqs && k.faqs.length){ L.push("FAQs:"); k.faqs.forEach(function(f){ L.push("- Q: "+f.q+"  A: "+f.a); }); }
  if(k.policies) L.push("Policies: "+k.policies);
  return L.join(NL);
}

function preview(){ var p=document.getElementById("preview"); p.textContent=buildPrompt(collect()); p.style.display="block"; }

function save(){
  var status=document.getElementById("status");
  var knowledge=collect();
  if(!NORRA_SAVE_API){ status.textContent="⚠ Set NORRA_SAVE_API to actually save — showing preview instead."; status.style.color="#9a5a1c"; preview(); return; }
  status.textContent="Saving…"; status.style.color="#6F685D";
  fetch(NORRA_SAVE_API,{ method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ client_id:CLIENT_ID, knowledge:knowledge }) })
    .then(function(r){ return r.json(); })
    .then(function(d){ status.textContent=d.ok?"✓ Saved — your agent is updated.":("✕ "+(d.error||"Save failed")); status.style.color=d.ok?"#1E6B3A":"#b23b3b"; })
    .catch(function(e){ status.textContent="✕ "+e.message; status.style.color="#b23b3b"; });
}

function setVal(id,v){ var el=document.getElementById(id); if(el) el.value=v||""; }
function fillForm(k){
  k=k||{};
  setVal("business_name",k.business_name); setVal("business_type",k.business_type);
  setVal("address",k.address); setVal("hours",k.hours); setVal("service_area",k.service_area);
  setVal("languages",k.languages); setVal("transfer_number",k.transfer_number); setVal("policies",k.policies);
  document.getElementById("services").innerHTML=""; document.getElementById("faqs").innerHTML="";
  var svc=(k.services&&k.services.length)?k.services:[{}]; svc.forEach(function(s){ addService(s); });
  var fq=(k.faqs&&k.faqs.length)?k.faqs:[{}]; fq.forEach(function(f){ addFaq(f); });
}
function importSite(){
  var status=document.getElementById("ingest_status");
  var url=document.getElementById("ingest_url").value.trim();
  if(!url){ status.textContent="Enter a website URL first."; status.style.color="#b23b3b"; return; }
  if(!NORRA_INGEST_API){ status.textContent="Set NORRA_INGEST_API to enable import."; status.style.color="#9a5a1c"; return; }
  status.textContent="Reading "+url+" — this can take a few seconds…"; status.style.color="#6F685D";
  fetch(NORRA_INGEST_API,{ method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({url:url}) })
    .then(function(r){ return r.json(); })
    .then(function(d){ if(d.ok){ fillForm(d.knowledge); status.textContent="✓ Imported — review and edit everything below, then Save."; status.style.color="#1E6B3A"; }
      else { status.textContent="✕ "+(d.error||"Import failed"); status.style.color="#b23b3b"; } })
    .catch(function(e){ status.textContent="✕ "+e.message; status.style.color="#b23b3b"; });
}

addService(); addFaq();
</script>
</body>
</html>
