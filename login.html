<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Norra — Client Login</title>
<meta name="description" content="Norra client login — manage your AI receptionist, update your knowledge base, and review your call history.">
<style>
  :root{--bg:#07120e;--bg2:#0d1c16;--panel:rgba(255,255,255,.05);--line:rgba(255,255,255,.1);--ink:#eaf3ee;--muted:#9ab0a6;--acc:#34d399;--acc2:#7debc3}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);background:radial-gradient(800px 460px at 50% 0%,#13352a,var(--bg) 60%)}
  a{color:inherit;text-decoration:none}
  .card{width:100%;max-width:420px;background:var(--bg2);border:1px solid var(--line);border-radius:20px;padding:34px 30px;text-align:center}
  .brand{display:inline-flex;align-items:center;gap:10px;margin-bottom:6px}
  .brand .dot{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#04140e;display:grid;place-items:center;font-weight:900;font-size:20px}
  .brand b{font-size:22px}
  h1{font-size:20px;margin:18px 0 4px}
  .sub{color:var(--muted);font-size:13.5px;margin:0 0 22px}
  label{display:block;text-align:left;font-size:12px;color:var(--muted);margin:0 0 12px}
  input{width:100%;margin-top:5px;background:rgba(0,0,0,.25);border:1px solid var(--line);color:var(--ink);border-radius:11px;padding:12px 14px;font-size:15px;font-family:inherit}
  input:focus{outline:none;border-color:var(--acc)}
  .btn{width:100%;border:none;border-radius:11px;padding:14px;font-size:15px;font-weight:800;cursor:pointer;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#04140e;margin-top:4px}
  .row{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;color:var(--muted);margin:14px 0 4px}
  .msg{font-size:13.5px;margin-top:16px;min-height:18px;line-height:1.5}
  .foot{margin-top:22px;font-size:12.5px;color:var(--muted)}
  .feat{display:flex;gap:14px;justify-content:center;margin:18px 0 4px;font-size:11.5px;color:var(--muted)}
  .feat span{display:flex;align-items:center;gap:5px}
  .feat i{width:6px;height:6px;border-radius:50%;background:var(--acc);display:inline-block}
</style>
</head>
<body>
  <div class="card">
    <a href="/" class="brand"><span class="dot">N</span> <b>Norra</b></a>
    <h1>Client Login</h1>
    <p class="sub">Manage your receptionist, knowledge base &amp; call history.</p>

    <form id="loginForm" onsubmit="return doLogin(event)">
      <label>Email<input type="email" name="email" placeholder="you@yourbusiness.com" required></label>
      <label>Password<input type="password" name="password" placeholder="••••••••" required></label>
      <div class="row"><span>Remember me</span><a href="#" style="color:var(--acc2)">Forgot password?</a></div>
      <button class="btn" type="submit">Sign in</button>
      <div class="msg" id="msg"></div>
    </form>

    <div class="feat">
      <span><i></i> Update knowledge</span>
      <span><i></i> Call history</span>
      <span><i></i> Live summaries</span>
    </div>

    <div class="foot">Don't have an account yet? <a href="/#demo" style="color:var(--acc2);font-weight:600">Book a free demo →</a></div>
  </div>

<script>
// ---- Test users (edit here to add/change logins) ----
// NOTE: this is a simple demo login, not bank-grade security. The real API keys
// live safely on the Cloudflare Workers, never in this page.
var USERS = [
  { email: "partner@norrahq.com", password: "Norra2026!" }
];

function doLogin(e){
  e.preventDefault();
  var msg=document.getElementById("msg");
  var f=e.target;
  var email=(f.email.value||"").trim().toLowerCase();
  var pass=f.password.value||"";
  var ok=USERS.some(function(u){ return u.email.toLowerCase()===email && u.password===pass; });
  if(ok){
    try{ localStorage.setItem("norra_session", email); }catch(err){}
    msg.style.color="var(--acc2)";
    msg.textContent="Signed in — opening your console…";
    window.location.href="/demo";
  } else {
    msg.style.color="#ef6a6a";
    msg.textContent="Email or password is incorrect. Please try again.";
  }
  return false;
}
</script>
</body>
</html>
