<svg width="1584" height="396" viewBox="0 0 1584 396" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0a1a14"/><stop offset="1" stop-color="#06100c"/></linearGradient>
    <radialGradient id="glow" cx="72%" cy="40%" r="60%"><stop offset="0" stop-color="#1d6e54" stop-opacity="0.5"/><stop offset="1" stop-color="#06100c" stop-opacity="0"/></radialGradient>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#34D399"/><stop offset="1" stop-color="#7DEBC3"/></linearGradient>
  </defs>
  <rect width="1584" height="396" fill="url(#bg)"/>
  <rect width="1584" height="396" fill="url(#glow)"/>

  <!-- soundwave motif right -->
  <g transform="translate(1330,198)" fill="#34D399" fill-opacity="0.85">
    <rect x="0" y="-20" width="10" height="40" rx="5"/>
    <rect x="24" y="-55" width="10" height="110" rx="5"/>
    <rect x="48" y="-90" width="10" height="180" rx="5"/>
    <rect x="72" y="-55" width="10" height="110" rx="5"/>
    <rect x="96" y="-20" width="10" height="40" rx="5"/>
  </g>

  <!-- text block (kept off the bottom-left where the logo overlays) -->
  <g transform="translate(150,150)">
    <rect x="0" y="-44" width="56" height="56" rx="15" fill="url(#mint)"/>
    <text x="28" y="-4" text-anchor="middle" font-size="34" font-weight="800" fill="#04140e">N</text>
    <text x="74" y="-4" font-size="40" font-weight="800" fill="#eaf3ee">Norra</text>
    <text x="0" y="56" font-size="44" font-weight="800" fill="#ffffff">Reception with a human touch, powered by AI.</text>
    <text x="0" y="110" font-size="28" font-weight="600" fill="#7DEBC3">AI receptionist for local business · answers every call · books every appointment · norrahq.com</text>
  </g>
</svg>
