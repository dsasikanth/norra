services:
  norra-india:
    build: .
    container_name: norra-india
    restart: unless-stopped
    env_file: .env
    ports:
      - "7860:7860"

  # Dev-only tunnel so Plivo can reach your laptop. In production, run the app
  # behind a real domain + TLS (e.g. Caddy/Nginx) instead of ngrok.
